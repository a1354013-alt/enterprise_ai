name: ci

on:
  push:
  pull_request:

jobs:
  test-build-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Backend pytest
        env:
          JWT_SECRET: ci-secret-ci-secret-ci-secret-ci-secret-1234
          DEFAULT_OWNER_PASSWORD: OwnerPass123!
          DATABASE_PATH: ./ci_test.db
          UPLOAD_DIR: ./ci_uploads
          PHOTO_DIR: ./ci_photos
          CHROMA_DB_PATH: ./ci_chroma
          AUTOTEST_DIR: ./ci_autotest
          AUTOTEST_MODE: simulated
        run: |
          cd backend
          python -m pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        run: |
          cd frontend
          npm ci

      - name: Frontend tests
        run: |
          cd frontend
          npm test

      - name: Frontend typecheck
        run: |
          cd frontend
          npm run typecheck

      - name: Frontend build
        run: |
          cd frontend
          npm run build

      - name: Version consistency
        run: |
          python scripts/check_version_consistency.py

      - name: Package release zip
        run: |
          python scripts/package_release.py ./knowledge_workspace_release.zip

      - name: Verify release zip exclusions
        run: |
          python - <<'PY'
          import zipfile
          bad = []
          with zipfile.ZipFile("knowledge_workspace_release.zip") as zf:
            names = zf.namelist()
          forbidden_parts = {".git", "node_modules", "__pycache__", "uploads", "photos", "chroma_db", "autotest_uploads"}
          for name in names:
            parts = set([p for p in name.split("/") if p])
            if parts & forbidden_parts:
              bad.append(name)
            if name.endswith(".db") or name.endswith("/.env") or name.endswith(".env"):
              bad.append(name)
          if bad:
            raise SystemExit("Forbidden paths in zip:\n" + "\n".join(sorted(set(bad))[:200]))
          print("OK: zip exclusions")
          PY

      - name: Start backend (for smoke)
        env:
          JWT_SECRET: ci-secret-ci-secret-ci-secret-ci-secret-1234
          DEFAULT_OWNER_PASSWORD: OwnerPass123!
          DATABASE_PATH: ./ci_documents.db
          UPLOAD_DIR: ./ci_uploads
          PHOTO_DIR: ./ci_photos
          CHROMA_DB_PATH: ./ci_chroma
          AUTOTEST_DIR: ./ci_autotest
          AUTOTEST_MODE: simulated
        run: |
          cd backend
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../ci_backend.log 2>&1 &
          echo $! > ../ci_backend.pid

      - name: Wait for backend ready
        run: |
          python - <<'PY'
          import sys
          import time
          import urllib.request

          url = "http://127.0.0.1:8000/api/health"
          deadline = time.time() + 60

          while time.time() < deadline:
            try:
              with urllib.request.urlopen(url, timeout=5) as resp:
                if resp.status == 200:
                  print("Backend is ready")
                  sys.exit(0)
            except Exception:
              time.sleep(1)

          print("Backend did not become ready in time")
          sys.exit(1)
          PY

      - name: Smoke check
        run: |
          python scripts/smoke_check.py --password "OwnerPass123!"

      - name: Stop backend
        if: always()
        run: |
          if [ -f ci_backend.pid ]; then
            kill "$(cat ci_backend.pid)" || true
          fi
          echo "===== ci_backend.log ====="
          cat ci_backend.log || true